<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>

  <style>
    * { font-family: "Geist", sans-serif; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <img class="w-8" src="./assets/github-logo.png" alt="Logo"/>
        GitHub Issues Tracker
      </h1>

      <div class="gap-2 sm: space-y-2 items-center text-center ">
        <input id="searchInput" type="text" placeholder="Search issues..." class="border rounded px-3 py-2 w-64"/>
        <button id="searchBtn" class="bg-[#4A00FF] text-white px-4 py-2 rounded">
          <i class="fa-solid fa-magnifying-glass"></i> Search
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="max-w-7xl mx-auto p-6">

    <!-- Tabs -->
    <div class="flex gap-4 mb-6">
      <button class="tabBtn bg-blue-600 text-white px-4 py-2 rounded hover:bg-sky-600" data-type="all">All</button>
      <button class="tabBtn border px-4 py-2 rounded hover:bg-sky-600" data-type="open">Open</button>
      <button class="tabBtn border px-4 py-2 rounded  hover:bg-sky-600" data-type="closed">Closed</button>
    </div>

    <!-- Stats card -->
    <div class="bg-white shadow flex justify-between items-center mb-6 max-w-7xl mx-auto px-4 py-4 rounded-xl">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h2 id="issueCount" class="font-bold text-xl text-gray-800">Issues</h2>
          <p class="text-gray-500 text-sm">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-6 text-sm font-medium">
        <span class="flex items-center gap-1 text-green-600"><span class="w-2 h-2 bg-green-600 rounded-full"></span>Open</span>
        <span class="flex items-center gap-1 text-purple-600"><span class="w-2 h-2 bg-purple-600 rounded-full"></span>Closed</span>
      </div>
    </div>

    <!-- Spinner -->
    <div id="spinner" class="hidden text-center py-10">Loading...</div>

    <!-- Issues Grid -->
    <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-xl p-6 relative shadow-xl">
      <button id="closeModal" class="absolute right-4 top-4 text-gray-500">✖</button>
      <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

      <div class="flex items-center gap-2 text-sm mb-4">
        <span id="modalStatus" class="bg-green-100 text-green-600 px-2 py-1 rounded-full text-xs">Open</span>
        <span class="text-gray-500">Opened by <span id="modalAuthor" class="font-medium"></span></span>
        <span class="text-gray-400">•</span>
        <span id="modalDate" class="text-gray-500"></span>
      </div>

      <div class="flex gap-3 mb-4">
        <span class="bg-red-100 text-red-500 text-xs px-3 py-1 rounded-full flex items-center gap-1">
          <i class="fa-solid fa-bug"></i> BUG
        </span>
        <span class="bg-yellow-100 text-yellow-600 text-xs px-3 py-1 rounded-full flex items-center gap-1">
          <i class="fa-regular fa-life-ring"></i> HELP WANTED
        </span>
      </div>

      <p id="modalDesc" class="text-gray-600 mb-6"></p>

      <div class="bg-gray-100 rounded-lg p-4 flex justify-between text-sm">
        <div>
          <p class="text-gray-500">Assignee:</p>
          <p id="modalAssignee" class="font-semibold text-gray-800"></p>
        </div>
        <div>
          <p class="text-gray-500">Priority:</p>
          <span id="modalPriority" class="bg-red-500 text-white text-xs px-3 py-1 rounded-full"></span>
        </div>
      </div>

      <div class="flex justify-end mt-6">
        <button id="closeModalBtn" class="bg-purple-600 text-white px-6 py-2 rounded">Close</button>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://phi-lab-server.vercel.app/api/v1/lab";
    let issuesData = [];

    async function loadIssues() {
      showSpinner(true);
      const res = await fetch(`${BASE_URL}/issues`);
      const data = await res.json();
      issuesData = data.data;
      renderIssues(issuesData);
      showSpinner(false);
    }

    function renderIssues(issues) {
      const container = document.getElementById("issuesContainer");
      container.innerHTML = "";
      document.getElementById("issueCount").innerText = `${issues.length} Issues`;

      issues.forEach(issue => {
        const border = issue.status === "open" ? "border-green-500" : "border-purple-500";
        const card = document.createElement("div");
        card.className = `bg-white rounded-xl shadow-sm border-t-4 ${border} p-5 hover:shadow-md transition cursor-pointer`;
        card.onclick = () => openModal(issue.id);

        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
              <i class="fa-solid fa-circle-dot text-green-600"></i>
            </div>
            <span class="bg-red-100 text-red-500 text-xs px-4 py-1 rounded-full font-semibold">${issue.priority}</span>
          </div>
          <h3 class="font-bold text-gray-800 text-lg mb-2">${issue.title}</h3>
          <p class="text-gray-500 text-sm mb-4">${issue.description?.slice(0,80)}...</p>
          <div class="flex gap-3 mb-4">
            <span class="bg-red-100 text-red-500 text-xs px-3 py-1 rounded-full flex items-center gap-1">
              <i class="fa-solid fa-bug"></i> BUG
            </span>
            <span class="bg-yellow-100 text-yellow-600 text-xs px-3 py-1 rounded-full flex items-center gap-1">
              <i class="fa-regular fa-life-ring"></i> HELP WANTED
            </span>
          </div>
          <div class="border-t pt-3 text-sm text-gray-500">
            <p>#${issue.id} by ${issue.author}</p>
            <p>${issue.createdAt.split('T')[0]}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function openModal(id) {
      const res = await fetch(`${BASE_URL}/issue/${id}`);
      const data = await res.json();
      const issue = data.data;

      document.getElementById("modalTitle").innerText = issue.title;
      document.getElementById("modalDesc").innerText = issue.description;
      document.getElementById("modalAuthor").innerText = issue.author;
      document.getElementById("modalAssignee").innerText = issue.author;
      document.getElementById("modalPriority").innerText = issue.priority;
      const date = issue.createdAt.split("T")[0];
      document.getElementById("modalDate").innerText = date;

      document.getElementById("modal").classList.remove("hidden");
    }

    document.getElementById("closeModal").onclick = () => document.getElementById("modal").classList.add("hidden");
    document.getElementById("closeModalBtn").onclick = () => document.getElementById("modal").classList.add("hidden");

    document.querySelectorAll(".tabBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabBtn").forEach(b => {
          b.classList.remove("bg-blue-600","text-white");
          b.classList.add("border");
        });
        btn.classList.add("bg-blue-600","text-white");

        const type = btn.dataset.type;
        renderIssues(type === "all" ? issuesData : issuesData.filter(issue => issue.status === type));
      });
    });

    document.getElementById("searchBtn").addEventListener("click", async () => {
      const query = document.getElementById("searchInput").value;
      if(!query) return renderIssues(issuesData);
      const res = await fetch(`${BASE_URL}/issues/search?q=${query}`);
      const data = await res.json();
      renderIssues(data.data);
    });

    function showSpinner(show) {
      const spinner = document.getElementById("spinner");
      if(show) spinner.classList.remove("hidden");
      else spinner.classList.add("hidden");
    }

    loadIssues();
    
  </script>
</body>
</html>
